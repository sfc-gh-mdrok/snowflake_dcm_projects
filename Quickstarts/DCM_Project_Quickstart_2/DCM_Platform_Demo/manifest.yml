manifest_version: 1

include_definitions:
  - definitions/.*

type: DCM_PROJECT

configurations:
  DEV:
    env_suffix: "_DEV"
    project_owner_role: "DCM_DEVELOPER" 
    ingest_perc: "5"
    wh_size: "X-SMALL"  
    users: 
      - "YOUR_USER"    
    teams: 
      - "Finance"
      
  PROD:
    env_suffix: ""
    project_owner_role: "DCM_PROD_DEPLOYER" 
    ingest_perc: "100"
    wh_size: "MEDIUM"
    users: 
      - "GITHUB_ACTIONS_SERVICE_USER"

    teams:
      - "Marketing"
      - "Finance"
      - "HR"
      - "IT"
      - "Sales"
      - "Research"
      - "Design"

      