name: ❄️ DCM 2) Test PR to main against STAGE and PROD

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ["main"]     
    paths:
      - 'Quickstarts/**'      
    
  workflow_dispatch:
  
env:
  DCM_PROJECT_PATH: ${{ vars.DCM_PROJECT_PATH }}
  SNOWFLAKE_PASSWORD: ${{ secrets.DEPLOYER_PAT }}
  SNOWFLAKE_USER: ${{ vars.SNOWFLAKE_USER }}
  
jobs:
  PARSE_MANIFEST:
    runs-on: ubuntu-latest
    outputs:
      stage_account: ${{ steps.get_targets.outputs.stage_account }}
      stage_role: ${{ steps.get_targets.outputs.stage_role }}
      stage_project_name: ${{ steps.get_targets.outputs.stage_project_name }}
      prod_account: ${{ steps.get_targets.outputs.prod_account }}
      prod_role: ${{ steps.get_targets.outputs.prod_role }}
      prod_project_name: ${{ steps.get_targets.outputs.prod_project_name }}
    steps:
    - name: Clone Repo
      uses: actions/checkout@v4

    - name: Get targets from manifest
      id: get_targets
      run: |
        MANIFEST_PATH="${{ env.DCM_PROJECT_PATH }}manifest.yml"
        
        echo "📂 Project path: \`$MANIFEST_PATH\`" >> $GITHUB_STEP_SUMMARY

        echo "stage_account=$(yq eval '.targets.DCM_DEV.account_identifier' "$MANIFEST_PATH" | sed 's/"//g' | sed "s/'//g")" >> $GITHUB_OUTPUT
        echo "stage_role=$(yq eval '.targets.DCM_DEV.project_owner' "$MANIFEST_PATH" | sed 's/"//g' | sed "s/'//g")" >> $GITHUB_OUTPUT
        echo "stage_project_name=$(yq eval '.targets.DCM_DEV.project_name' "$MANIFEST_PATH" | sed 's/"//g' | sed "s/'//g")" >> $GITHUB_OUTPUT
        echo "prod_account=$(yq eval '.targets.DCM_STAGE.account_identifier' "$MANIFEST_PATH" | sed 's/"//g' | sed "s/'//g")" >> $GITHUB_OUTPUT
        echo "prod_role=$(yq eval '.targets.DCM_STAGE.project_owner' "$MANIFEST_PATH" | sed 's/"//g' | sed "s/'//g")" >> $GITHUB_OUTPUT
        echo "prod_project_name=$(yq eval '.targets.DCM_STAGE.project_name' "$MANIFEST_PATH" | sed 's/"//g' | sed "s/'//g")" >> $GITHUB_OUTPUT

        for TARGET in DCM_DEV DCM_STAGE; do
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**${TARGET}:**" >> $GITHUB_STEP_SUMMARY
          echo "- Snowflake account: \`$(yq eval ".targets.$TARGET.account_identifier" "$MANIFEST_PATH" | sed 's/"//g' | sed "s/'//g")\`" >> $GITHUB_STEP_SUMMARY
          echo "- Project object: \`$(yq eval ".targets.$TARGET.project_name" "$MANIFEST_PATH" | sed 's/"//g' | sed "s/'//g")\`" >> $GITHUB_STEP_SUMMARY
          echo "- Project owner: \`$(yq eval ".targets.$TARGET.project_owner" "$MANIFEST_PATH" | sed 's/"//g' | sed "s/'//g")\`" >> $GITHUB_STEP_SUMMARY
          echo "- Templating Config: \`$(yq eval ".targets.$TARGET.templating_config" "$MANIFEST_PATH" | sed 's/"//g' | sed "s/'//g")\`" >> $GITHUB_STEP_SUMMARY
        done

  STAGE_PLAN:
    needs: PARSE_MANIFEST
    runs-on: ubuntu-latest
    environment: DCM_DEV
    env:
      SNOWFLAKE_ACCOUNT: ${{ needs.PARSE_MANIFEST.outputs.stage_account }}
      SNOWFLAKE_ROLE: ${{ needs.PARSE_MANIFEST.outputs.stage_role }}
    steps:
    - name: Clone Repo
      uses: actions/checkout@v4
      
    - name: Setup SnowCLI
      run: pip install git+https://github.com/snowflakedb/snowflake-cli.git
      
    - name: Execute PLAN against STAGE and summarize output
      id: stage_plan
      run: |        
        cd ./$DCM_PROJECT_PATH
        snow dcm create --target DCM_DEV --if-not-exists -x

        mkdir -p summary
        
        if snow dcm plan --target DCM_DEV --save-output -x; then        
          echo "### ✅ DCM Plan to STAGE successful" >> $GITHUB_STEP_SUMMARY
          
          PLAN_METADATA_FILE="out/plan/plan_result.json"
          for OP_TYPE in CREATE ALTER DROP; do
            case $OP_TYPE in CREATE) OP_ICON="🟢";; ALTER) OP_ICON="🟡";; DROP) OP_ICON="🔴";; esac
            OP_COUNT=$(jq --arg OP_TYPE "$OP_TYPE" '.changeset[] | select(.type == $OP_TYPE)' "$PLAN_METADATA_FILE" | jq -s 'length')
            echo "**${OP_ICON} ${OP_TYPE} operations: $OP_COUNT**" >> $GITHUB_STEP_SUMMARY
            if [ "$OP_COUNT" -gt 0 ]; then
              OBJECT_DOMAINS=$(jq -r --arg OP_TYPE "$OP_TYPE" '[.changeset[] | select(.type == $OP_TYPE) | .object_id.domain] | unique | .[]' "$PLAN_METADATA_FILE")
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              for DOMAIN in $OBJECT_DOMAINS; do
                DOMAIN_COUNT=$(jq --arg OP_TYPE "$OP_TYPE" --arg DOMAIN "$DOMAIN" '.changeset[] | select(.type == $OP_TYPE and .object_id.domain == $DOMAIN)' "$PLAN_METADATA_FILE" | jq -s 'length')
                echo "- $DOMAIN: $DOMAIN_COUNT" >> $GITHUB_STEP_SUMMARY
              done
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            fi
          done
          
          cp $GITHUB_STEP_SUMMARY summary/stage-plan-summary.md
            
        else
          echo "### ❌ DCM Plan to STAGE failed" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat out/plan/plan_result.json >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          
          cp $GITHUB_STEP_SUMMARY summary/stage-plan-summary.md
          exit 1
        fi
    
    - name: Upload STAGE PLAN output
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: stage-plan-output
        path: ${{ env.DCM_PROJECT_PATH }}out/plan/plan_result.json

    - name: Upload STAGE PLAN Summary
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: stage-plan-summary
        path: ${{ env.DCM_PROJECT_PATH }}summary/stage-plan-summary.md

        
  PROD_PLAN:
    needs: PARSE_MANIFEST
    runs-on: ubuntu-latest
    environment: DCM_STAGE
    env:
      SNOWFLAKE_ACCOUNT: ${{ needs.PARSE_MANIFEST.outputs.prod_account }}
      SNOWFLAKE_ROLE: ${{ needs.PARSE_MANIFEST.outputs.prod_role }}
    steps:
    - name: Clone Repo
      uses: actions/checkout@v4

    - name: Setup SnowCLI
      run: pip install git+https://github.com/snowflakedb/snowflake-cli.git
        
    - name: Execute PLAN against PROD and summarize output
      id: prod_plan
      run: |        
        cd ./$DCM_PROJECT_PATH
        snow dcm create --target DCM_STAGE --if-not-exists -x

        mkdir -p summary
        
        if snow dcm plan --target DCM_STAGE --save-output -x; then        
          echo "### ✅ DCM Plan to PROD successful" >> $GITHUB_STEP_SUMMARY
          
          PLAN_METADATA_FILE="out/plan/plan_result.json"
          for OP_TYPE in CREATE ALTER DROP; do
            case $OP_TYPE in CREATE) OP_ICON="🟢";; ALTER) OP_ICON="🟡";; DROP) OP_ICON="🔴";; esac
            OP_COUNT=$(jq --arg OP_TYPE "$OP_TYPE" '.changeset[] | select(.type == $OP_TYPE)' "$PLAN_METADATA_FILE" | jq -s 'length')
            echo "**${OP_ICON} ${OP_TYPE} operations: $OP_COUNT**" >> $GITHUB_STEP_SUMMARY
            if [ "$OP_COUNT" -gt 0 ]; then
              OBJECT_DOMAINS=$(jq -r --arg OP_TYPE "$OP_TYPE" '[.changeset[] | select(.type == $OP_TYPE) | .object_id.domain] | unique | .[]' "$PLAN_METADATA_FILE")
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              for DOMAIN in $OBJECT_DOMAINS; do
                DOMAIN_COUNT=$(jq --arg OP_TYPE "$OP_TYPE" --arg DOMAIN "$DOMAIN" '.changeset[] | select(.type == $OP_TYPE and .object_id.domain == $DOMAIN)' "$PLAN_METADATA_FILE" | jq -s 'length')
                echo "- $DOMAIN: $DOMAIN_COUNT" >> $GITHUB_STEP_SUMMARY
              done
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            fi
          done
          
          cp $GITHUB_STEP_SUMMARY summary/prod-plan-summary.md
            
        else
          echo "### ❌ DCM Plan to PROD failed" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat out/plan/plan_result.json >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          
          cp $GITHUB_STEP_SUMMARY summary/prod-plan-summary.md
          exit 1
        fi
    
    - name: Upload PROD PLAN output
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: prod-plan-output
        path: ${{ env.DCM_PROJECT_PATH }}out/plan/plan_result.json

    - name: Upload PROD PLAN Summary
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: prod-plan-summary
        path: ${{ env.DCM_PROJECT_PATH }}summary/prod-plan-summary.md


  COMMENT_ON_PR:
    needs: [STAGE_PLAN, PROD_PLAN]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Download all summaries
        uses: actions/download-artifact@v4
        with:
          pattern: '*-summary'
          merge-multiple: true
        
      - name: Post Summary to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            const jobs = {
              'STAGE': { result: '${{ needs.STAGE_PLAN.result }}', file: 'stage-plan-summary.md' },
              'PROD': { result: '${{ needs.PROD_PLAN.result }}', file: 'prod-plan-summary.md' }
            };
            
            let comment = '### ❄️ DCM merge check\n\n';
            
            for (const [env, data] of Object.entries(jobs)) {
              try {
                comment += fs.readFileSync(data.file, 'utf8');
                comment += `---\n`;
              } 
              catch (error) {
                comment += `Could not retrieve summary. [View logs for details](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\n`;
              }
            }
            
            comment += `🔎 [View full workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            
            if (context.eventName === 'pull_request') {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }
